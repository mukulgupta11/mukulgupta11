name: Update Github Stats
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  update-stats:
    runs-on: ubuntu-latest
    # THIS SECTION IS REQUIRED TO ALLOW SAVING THE IMAGES
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Stats Cards
        run: |
          curl "https://github-readme-stats.vercel.app/api?username=mukulgupta11&theme=dark&hide_border=false&include_all_commits=true&count_private=true" -o stats.svg
          curl "https://github-readme-streak-stats.herokuapp.com/?user=mukulgupta11&theme=dark&hide_border=false" -o streak.svg
          curl "https://github-readme-stats.vercel.app/api/top-langs/?username=mukulgupta11&theme=dark&hide_border=false&include_all_commits=true&count_private=true&layout=compact" -o langs.svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg streak.svg langs.svg
          git commit -m "Update stats images" || exit 0
          git push
